<!DOCTYPE html>
<html lang="{{ ui_lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strawberry Panic — Translation Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">
    <nav class="bg-gray-800 border-b border-gray-700 px-6 py-3 flex items-center gap-4 flex-wrap">
        <a href="/scripts" class="text-pink-400 font-bold text-lg">{{ _('nav.brand') }}</a>
        <a href="/dashboard" class="text-gray-300 hover:text-white text-sm">{{ _('nav.dashboard') }}</a>
        <a href="/scripts" class="text-gray-300 hover:text-white text-sm">{{ _('nav.scripts') }}</a>
        <a href="/search" class="text-gray-300 hover:text-white text-sm">{{ _('nav.search') }}</a>
        <a href="/delegation" class="text-gray-300 hover:text-white text-sm">{{ _('nav.delegate') }}</a>
        <a href="/import" class="text-gray-300 hover:text-white text-sm">{{ _('nav.import') }}</a>
        <a href="/build" class="text-gray-300 hover:text-white text-sm">{{ _('nav.build') }}</a>
        <a href="/settings" class="text-gray-300 hover:text-white text-sm ml-auto">⚙</a>
        <span class="text-gray-500 text-xs">{{ _('nav.version') }}</span>
    </nav>
    <main class="max-w-7xl mx-auto px-4 py-6">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
